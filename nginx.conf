server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Don't leak nginx version in headers/error pages
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # --- Security headers ---
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "0" always;

  # --- Block access to dotfiles (.env, .git, .htaccess, .DS_Store, etc.), except .well-known ---
  location ~ /\.(?!well-known).* {
    deny all;
    return 404;
  }

  # --- Block common config/backup/source file extensions anywhere in the tree ---
  location ~* \.(env|ya?ml|toml|ini|log|bak|backup|old|orig|save|swp|sql|conf|config|lock|json|json\.map|map)$ {
    deny all;
    return 404;
  }

  # --- Block VCS / package metadata directories if they ever end up in the build ---
  location ~ ^/(\.git|\.svn|node_modules|src|package\.json|package-lock\.json|yarn\.lock|tsconfig.*\.json|vite\.config\.*|\.env.*)$ {
    deny all;
    return 404;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";

    # Don't ship JS/CSS source maps to the client in prod
    location ~* \.map$ {
      deny all;
      return 404;
    }
  }

  location = /api {
    limit_except GET POST PUT PATCH DELETE OPTIONS { deny all; }

    proxy_pass ${BACKEND_URL};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_except GET POST PUT PATCH DELETE OPTIONS { deny all; }

    proxy_pass ${BACKEND_URL};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass ${BACKEND_URL};

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
